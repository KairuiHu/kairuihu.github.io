<style>
  :root{
    --kh-title:#684e43;       /* warm brown */
    --kh-link:#7e9150;        /* olive green */
    --kh-link-hover:#8e6e29;  /* mustard */
    --kh-highlight:#b6274e;   /* crimson */
  }
  .page__content h1,
  .page__content h2,
  .page__content h3,
  .archive__item-title,
  .author__name { color: var(--kh-title); }

  .page__content a,
  .page__content a:visited { color: var(--kh-link); }
  .page__content a:hover { color: var(--kh-link-hover); }

  .author__urls a { color: var(--kh-link); }
  .author__urls a:hover { color: var(--kh-link-hover); }

  .badge { background-color: var(--kh-highlight) !important; }
