<!-- Source Sans (cleaner, shulin16-like typography) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  /* Typography — cleaner, shulin16-like (colors left at theme default) */
  body, .page__content {
    font-family: "Source Sans 3", "Source Sans Pro", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .page__content { font-size: 1.08rem; line-height: 1.65; }
  .page__content h1 { font-size: 1.65rem; font-weight: 700; margin: 1.5em 0 0.55em; }
  .page__content h1:first-of-type { margin-top: 0.3em; }
  .author__name { font-weight: 700; }

  /* No underlines on content links; all links bold */
  .page__content a, .page__content a:hover { text-decoration: none; font-weight: 600; }

  /* News — scrollable box with a thick, professional scrollbar (Google-like) */
  .page__content .news-scroll {
    max-height: 210px;
    overflow-y: scroll;
    padding-right: 14px;
    scrollbar-width: auto;
    scrollbar-color: #c1c1c1 #f1f1f1;
  }
  .news-scroll::-webkit-scrollbar { width: 14px; }
  .news-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
  .news-scroll::-webkit-scrollbar-thumb {
    background: #c1c1c1;
    border-radius: 8px;
    border: 3px solid #f1f1f1;
  }
  .news-scroll::-webkit-scrollbar-thumb:hover { background: #a6a6a6; }

  /* Experience: muted subtitle line (role/org is the title above it) */
  .page__content .exp-meta { color: #8a8a8a; font-size: 0.92rem; }
  /* two-line sidebar bio breathing room */
  .author__bio { line-height: 1.4; }

  /* Conference venue written separately (no badge on the image) */
  /* Conference name — crimson label (shulin16 accent) */
  .paper-box-text .pub-venue {
    display: inline-block;
    font-size: 0.82rem;
    font-weight: 700;
    color: #b6274e;
    background: rgba(182, 39, 78, 0.08);
    padding: 2px 10px;
    border-radius: 5px;
    letter-spacing: 0.01em;
    margin: 0.25em 0;
  }

  /* Paper / Project / GitHub as clean pill buttons — olive-green accent (shulin16) */
  .paper-box-text .pub-links { margin: 0.4em 0 0.2em; }
  .paper-box-text .pub-links a {
    display: inline-block;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 3px 13px;
    margin: 0 7px 7px 0;
    border-radius: 7px;
    background: #eef2e6;
    color: #5f7d2e;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .paper-box-text .pub-links a:hover { background: #6d8436; color: #fff; }

  /* ===== Apple-style scroll reveal (only active when .reveal-on is set) ===== */
  .reveal-on .page__content > h1,
  .reveal-on .page__content > p,
  .reveal-on .page__content > .paper-box,
  .reveal-on .page__content > .news-scroll,
  .reveal-on .page__content > ul {
    opacity: 0;
    transform: translateY(26px);
    transition: opacity 0.7s cubic-bezier(0.2, 0.65, 0.25, 1),
                transform 0.7s cubic-bezier(0.2, 0.65, 0.25, 1);
    will-change: opacity, transform;
  }
  .reveal-on .page__content > .in-view {
    opacity: 1 !important;
    transform: none !important;
  }

  /* ===== Cute cat + vibe status, sitting by the News title ===== */
  .page__content h1 .news-cat {
    position: absolute;
    right: 2px;
    bottom: -6px;
    display: inline-flex;
    align-items: flex-end;
    gap: 9px;
    font-weight: 400;
    pointer-events: none;
  }
  .news-cat .cat-svg {
    width: auto;
    height: 48px;
    flex: 0 0 auto;
    display: block;
    cursor: pointer;
    pointer-events: auto;
    -webkit-user-drag: none;
    user-select: none;
  }
  .news-cat .cat-bubble {
    max-width: 220px;
    white-space: nowrap;
    font-family: "Source Sans 3", sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: #6b6660;
    background: #fffdf9;
    border: 1px solid #ece7dd;
    border-radius: 12px;
    padding: 5px 11px;
    margin-bottom: 8px;
    box-shadow: 0 6px 16px rgba(80, 60, 40, 0.10);
    position: relative;
    opacity: 0;
    transform: translateY(5px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .news-cat .cat-bubble.show { opacity: 1; transform: none; }
  .news-cat .cat-bubble::after {
    content: "";
    position: absolute;
    right: -5px;
    bottom: 10px;
    width: 8px;
    height: 8px;
    background: #fffdf9;
    border-right: 1px solid #ece7dd;
    border-bottom: 1px solid #ece7dd;
    transform: rotate(-45deg);
  }
  .news-cat .cat-svg.bounce { animation: catBounce 0.5s ease; }
  @keyframes catBounce {
    0% { transform: translateY(0); }
    30% { transform: translateY(-7px); }
    55% { transform: translateY(0); }
    70% { transform: translateY(-3px); }
    100% { transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .news-cat .cat-body, .news-cat .cat-tail { animation: none; }
  }
  @media (max-width: 520px) { .news-cat .cat-bubble { display: none; } }
</style>

<script>
  /* Enable scroll-reveal only when supported and motion is allowed — otherwise
     content is never hidden (no reliance on JS to show it). */
  (function () {
    try {
      if ("IntersectionObserver" in window &&
          !(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches)) {
        document.documentElement.classList.add("reveal-on");
      }
    } catch (e) {}
  })();
</script>
